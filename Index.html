<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>jQuery Image Slider</title>
<link rel="stylesheet"
href="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.7/css/bootstrap.min.css"
crossorigin="anonymous">
<style type="text/css">
body {
    background-color: black;
}
.slider {
    margin-top: 10%;
}
.slider img {
    display: none;
}
.slider img.active {
    display: block;
    border: 2px solid white;
}
</style>
</head>
<body>
<center>
<div class="slider">
    <img src="images/1.jpeg">
    <img src="images/2.jpeg">
    <img src="images/3.jpeg" class="active">
    
</div>

<br><br>

<input type="button" class="btn btn-primary"
onclick="changeSlide('previous')" value="Previous">

<input type="button" class="btn btn-success"
onclick="slideShow(this)" value="Start Slideshow">

<input type="button" class="btn btn-primary"
onclick="changeSlide('next')" value="Next">

</center>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"
crossorigin="anonymous"></script>

<script type="text/javascript">

var stopSlideShow = false;

function slideShow(caller) {

    var status = $(caller).attr("value");

    if (status.indexOf("Start") > -1) {

        stopSlideShow = false;

        $(caller).attr("value", "Stop Slideshow");

        $(caller).addClass("btn-danger").removeClass("btn-success");

    }

    else {

        stopSlideShow = true;

        $(caller).attr("value", "Start Slideshow");

        $(caller).addClass("btn-success").removeClass("btn-danger");

    }

    var interval = setInterval(function () {

        if (!stopSlideShow)

            changeSlide("next");

        else

            clearInterval(interval);

    }, 2000);

}

function changeSlide(direction) {

    var currentImg = $(".active");

    var nextImg = currentImg.next();

    var previousImg = currentImg.prev();

    if (direction == "next") {

        if (nextImg.length)

            nextImg.addClass("active");

        else

            $(".slider img").first().addClass("active");

    }

    else {

        if (previousImg.length)

            previousImg.addClass("active");

        else

            $(".slider img").last().addClass("active");

    }

    currentImg.removeClass("active");

}

</script>

</body>
</html>
